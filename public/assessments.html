<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TE Connectivity - Readiness Assessments</title>
  <meta name="description" content="Readiness Assessment Center — structured readiness assessments of the acquirer, the target company and the Integration Leader, feeding phase gates and coaching.">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css?v=1784300020">
  <script src="/js/transitions.js?v=1784300020"></script>
  <style>
    .as-wrap{ max-width:1100px; margin:0 auto; }
    .as-hero{ margin-bottom:1.25rem; }
    .as-hero h1{ font-size:1.9rem; color:var(--te-dark-teal); margin:0 0 .35rem; }
    .as-hero p{ color:var(--text-secondary); max-width:820px; line-height:1.55; margin:0; }
    .as-tabs{ display:flex; gap:.5rem; border-bottom:2px solid var(--border-color); margin-bottom:1.5rem; flex-wrap:wrap; }
    .as-tab{ background:none; border:none; font-family:var(--font-family-display); font-size:1rem; font-weight:700; color:var(--text-dim); padding:.6rem 1.1rem; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; }
    .as-tab.active{ color:var(--te-dark-teal); border-bottom-color:var(--te-orange); }
    .as-pane{ animation:slideIn var(--transition-normal); }
    /* overview */
    .as-req-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:1.1rem; }
    .as-req-card{ background:var(--card-bg,#fff); border:1px solid var(--border-color); border-top:4px solid var(--te-orange); border-radius:12px; padding:1.1rem 1.25rem; display:flex; flex-direction:column; gap:.6rem; }
    .as-req-head{ display:flex; align-items:flex-start; justify-content:space-between; gap:.75rem; }
    .as-req-name{ font-size:1.05rem; font-weight:800; color:var(--te-dark-teal); line-height:1.2; }
    .as-req-sub{ font-size:.76rem; color:var(--text-dim); margin-top:.2rem; }
    .as-req-foot{ display:flex; align-items:center; justify-content:space-between; gap:.5rem; border-top:1px dashed var(--border-color); padding-top:.65rem; margin-top:auto; }
    /* chips */
    .as-chip{ font-size:.68rem; font-weight:800; padding:.18rem .55rem; border-radius:20px; letter-spacing:.02em; white-space:nowrap; }
    .as-chip-req{ background:rgba(233,131,0,.1); color:#C77700; border:1px solid rgba(233,131,0,.3); }
    .as-chip-green{ background:rgba(63,122,55,.1); color:#3f7a37; border:1px solid rgba(63,122,55,.3); }
    .as-chip-amber{ background:rgba(199,119,0,.1); color:#C77700; border:1px solid rgba(199,119,0,.3); }
    .as-chip-red{ background:rgba(192,57,43,.1); color:#C0392B; border:1px solid rgba(192,57,43,.3); }
    .as-chip-grey{ background:var(--bg-subtle,#eef2f2); color:var(--text-dim); border:1px solid var(--border-color); }
    /* score ring */
    .as-score{ flex:none; text-align:center; }
    .as-score-ring{ border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; margin:0 auto; }
    .as-score-lbl{ font-size:.68rem; color:var(--text-dim); margin-top:.3rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    /* scorecard */
    .as-card{ background:var(--card-bg,#fff); border:1px solid var(--border-color); border-radius:12px; padding:1.4rem 1.5rem; margin-bottom:1.25rem; }
    .as-card h3{ margin:0 0 .75rem; color:var(--te-dark-teal); font-size:1.05rem; }
    .as-sc-top{ display:flex; align-items:center; gap:1.5rem; flex-wrap:wrap; border-bottom:1px solid var(--border-color); padding-bottom:1rem; margin-bottom:1.1rem; }
    .as-sc-meta{ flex:1; min-width:220px; }
    .as-sc-title{ font-size:1.35rem; font-weight:800; color:var(--te-dark-teal); line-height:1.2; margin:0; }
    .as-sc-info{ font-size:.8rem; color:var(--text-dim); margin-top:.4rem; display:flex; gap:1rem; flex-wrap:wrap; }
    .as-band-badge{ display:inline-block; font-size:.8rem; font-weight:800; color:#fff; border-radius:20px; padding:.3rem .85rem; margin-top:.55rem; }
    .as-sc-grid{ display:grid; grid-template-columns:minmax(280px,1fr) minmax(300px,1.2fr); gap:1.5rem; align-items:start; }
    @media (max-width:860px){ .as-sc-grid{ grid-template-columns:1fr; } }
    /* dimension bars */
    .as-dim-row{ margin-bottom:.85rem; }
    .as-dim-head{ display:flex; justify-content:space-between; align-items:center; gap:.75rem; margin-bottom:.3rem; }
    .as-dim-name{ font-size:.85rem; font-weight:700; color:var(--text-primary); display:flex; align-items:center; gap:.45rem; }
    .as-dim-ico{ font-size:.95rem; }
    .as-dim-val{ font-weight:800; font-size:.9rem; display:flex; align-items:center; gap:.45rem; }
    .as-dim-track{ height:9px; border-radius:5px; background:var(--bg-subtle,#eef2f2); overflow:hidden; }
    .as-dim-fill{ height:100%; border-radius:5px; transition:width .5s ease; }
    .as-delta{ font-size:.72rem; font-weight:800; }
    .as-delta.up{ color:#3f7a37; } .as-delta.down{ color:#C0392B; }
    /* radar */
    .as-radar-wrap{ max-width:420px; margin:0 auto; }
    .as-radar-wrap svg{ width:100%; height:auto; display:block; }
    .as-radar-legend{ display:flex; justify-content:center; gap:1.25rem; margin-top:.4rem; flex-wrap:wrap; }
    .as-radar-key{ font-size:.78rem; font-weight:700; color:var(--text-secondary); display:flex; align-items:center; gap:.4rem; }
    .as-radar-swatch{ width:12px; height:12px; border-radius:3px; display:inline-block; }
    /* compatibility */
    .as-compat-rings{ display:flex; align-items:center; justify-content:center; gap:2.25rem; flex-wrap:wrap; margin-bottom:.4rem; }
    .as-compat-mid .as-score-ring{ box-shadow:0 0 0 5px rgba(233,131,0,.15); }
    .as-pair-row{ margin-bottom:1rem; }
    .as-pair-head{ display:flex; justify-content:space-between; align-items:center; gap:.75rem; margin-bottom:.35rem; }
    .as-pair-name{ font-size:.85rem; font-weight:700; color:var(--text-primary); display:flex; align-items:center; gap:.45rem; }
    .as-pair-gap{ font-size:.72rem; font-weight:800; }
    .as-pair-bars{ display:flex; flex-direction:column; gap:.28rem; }
    .as-pair-track{ height:8px; border-radius:4px; background:var(--bg-subtle,#eef2f2); overflow:hidden; position:relative; }
    .as-pair-fill{ height:100%; border-radius:4px; }
    .as-pair-tag{ font-size:.62rem; font-weight:800; color:var(--text-dim); width:64px; flex:none; text-transform:uppercase; letter-spacing:.04em; }
    .as-pair-line{ display:flex; align-items:center; gap:.5rem; }
    .as-pair-val{ font-size:.72rem; font-weight:800; width:26px; text-align:right; flex:none; }
    /* leader: dumbbell gap + dev plan */
    .as-db-row{ margin-bottom:.9rem; }
    .as-db-track{ position:relative; height:10px; border-radius:5px; background:var(--bg-subtle,#eef2f2); }
    .as-db-line{ position:absolute; top:50%; height:3px; transform:translateY(-50%); background:rgba(100,116,139,.35); border-radius:2px; }
    .as-db-dot{ position:absolute; top:50%; width:14px; height:14px; border-radius:50%; transform:translate(-50%,-50%); border:2.5px solid #fff; box-shadow:0 1px 3px rgba(0,0,0,.25); }
    .as-exp-chip{ display:inline-flex; align-items:center; gap:.4rem; font-size:.74rem; font-weight:800; color:var(--te-dark-teal); background:rgba(36,76,90,.07); border:1px solid rgba(36,76,90,.2); border-radius:20px; padding:.28rem .75rem; margin-top:.55rem; margin-left:.5rem; }
    .as-plan-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:1rem; }
    .as-plan-col{ background:var(--bg-subtle,#f7f9f9); border:1px solid var(--border-color); border-radius:10px; padding:.9rem 1rem; }
    .as-plan-col h4{ margin:0 0 .6rem; font-size:.76rem; text-transform:uppercase; letter-spacing:.05em; color:var(--te-orange); }
    .as-plan-item{ font-size:.83rem; line-height:1.5; color:var(--text-primary); margin-bottom:.6rem; }
    .as-plan-item .btn{ margin-top:.35rem; }
    .as-cb{ display:flex; align-items:flex-start; gap:.6rem; width:100%; text-align:left; border:1.5px solid var(--border-color); background:var(--card-bg,#fff); border-radius:8px; padding:.6rem .85rem; cursor:pointer; font-size:.85rem; line-height:1.5; color:var(--text-primary); margin-bottom:.45rem; transition:all .15s; font-family:inherit; }
    .as-cb .box{ flex:none; width:18px; height:18px; border-radius:4px; border:2px solid var(--border-color); display:flex; align-items:center; justify-content:center; font-size:.7rem; color:#fff; margin-top:.1rem; }
    .as-cb.sel{ border-color:var(--te-dark-teal); }
    .as-cb.sel .box{ background:var(--te-dark-teal); border-color:var(--te-dark-teal); }
    /* remediation */
    .as-remed{ border-left:4px solid var(--te-orange); background:var(--bg-subtle,#f7f9f9); border-radius:8px; padding:.8rem 1rem; margin-bottom:.7rem; }
    .as-remed .d{ font-size:.74rem; font-weight:800; color:#C77700; text-transform:uppercase; letter-spacing:.04em; margin-bottom:.25rem; display:flex; gap:.5rem; align-items:center; flex-wrap:wrap; }
    .as-remed p{ margin:0; font-size:.85rem; line-height:1.55; color:var(--text-primary); }
    /* wizard */
    .as-wizard{ max-width:760px; }
    .as-wz-head{ display:flex; justify-content:space-between; align-items:center; gap:1rem; margin-bottom:.65rem; flex-wrap:wrap; }
    .as-wz-step{ font-weight:800; color:var(--te-orange); font-size:.9rem; }
    .as-wz-bar{ height:7px; background:var(--bg-subtle,#eef2f2); border-radius:4px; overflow:hidden; margin-bottom:1.25rem; }
    .as-wz-fill{ height:100%; background:linear-gradient(90deg,var(--te-orange),#C77700); border-radius:4px; transition:width .35s ease; }
    .as-q{ margin-bottom:1.4rem; }
    .as-q-text{ font-size:.95rem; font-weight:600; color:var(--text-primary); line-height:1.5; margin-bottom:.65rem; }
    .as-likert{ display:grid; grid-template-columns:repeat(5,1fr); gap:.4rem; }
    .as-lk{ border:1.5px solid var(--border-color); background:var(--card-bg,#fff); border-radius:8px; padding:.5rem .25rem; text-align:center; cursor:pointer; font-weight:800; font-size:.95rem; color:var(--text-secondary); transition:all .15s; font-family:inherit; }
    .as-lk:hover{ border-color:var(--te-orange); }
    .as-lk.sel{ background:var(--te-dark-teal); border-color:var(--te-dark-teal); color:#fff; }
    .as-lk-anchors{ display:flex; justify-content:space-between; font-size:.68rem; color:var(--text-dim); margin-top:.3rem; }
    .as-opt{ display:block; width:100%; text-align:left; border:1.5px solid var(--border-color); background:var(--card-bg,#fff); border-radius:8px; padding:.65rem .85rem; cursor:pointer; font-size:.85rem; line-height:1.5; color:var(--text-primary); margin-bottom:.45rem; transition:all .15s; font-family:inherit; }
    .as-opt:hover{ border-color:var(--te-orange); }
    .as-opt.sel{ background:rgba(36,76,90,.06); border-color:var(--te-dark-teal); box-shadow:inset 3px 0 0 var(--te-dark-teal); }
    .as-wz-nav{ display:flex; justify-content:space-between; gap:1rem; margin-top:1.5rem; }
    .as-note{ font-size:.75rem; color:var(--text-dim); font-style:italic; line-height:1.5; margin-top:1rem; border-top:1px dashed var(--border-color); padding-top:.7rem; }
    .as-warn{ font-size:.78rem; line-height:1.5; background:rgba(199,119,0,.07); border:1px solid rgba(199,119,0,.25); color:#8a5200; border-radius:8px; padding:.6rem .85rem; margin-bottom:1rem; }
    .as-err{ color:#C0392B; font-size:.82rem; font-weight:700; margin-top:.6rem; display:none; }
    .as-actions{ display:flex; gap:.6rem; flex-wrap:wrap; }
    /* exec readout: hidden on screen; the ONLY thing shown when printing */
    #as-readout{ display:none; }
    @media print {
      body > *:not(#as-readout){ display:none !important; }
      #as-readout{ display:block !important; padding:0; }
      @page { margin: 14mm; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="main-header">
      <div class="brand-wrapper">
        <div class="brand-logo-container">
          <img class="brand-logo-svg" src="/te-logo.png" alt="TE Connectivity" style="height:36px;width:auto;display:block;">
        </div>
        <div class="brand-divider"></div>
        <div class="brand-title"><span class="portal-badge">M&A Integration</span></div>
      </div>
      <nav class="navigation-bar">
        <a href="/" class="nav-link" data-i18n="assess.nav_overview">Overview</a>
        <a href="/dashboard.html" class="nav-link">Integration Leader Portal</a>
      </nav>
    </header>

    <main class="main-content">
      <div class="as-wrap">
        <div class="as-hero">
          <h1 data-i18n="assess.center_title">Readiness Assessment Center</h1>
          <p data-i18n="assess.center_sub">Structured readiness assessments of both companies and the Integration Leader. Scores feed the integration plan, coaching and phase gates.</p>
        </div>
        <div class="as-tabs" id="as-tabs" role="tablist">
          <button class="as-tab active" data-as-tab="overview" data-i18n="assess.tab_overview">Overview</button>
          <button class="as-tab" data-as-tab="acquirer" data-i18n="assess.tab_acquirer">Acquirer Readiness</button>
          <button class="as-tab" data-as-tab="target" data-i18n="assess.tab_target">Target Readiness</button>
          <button class="as-tab" data-as-tab="compat" data-i18n="assess.tab_compat">Compatibility</button>
          <button class="as-tab" data-as-tab="leader" data-i18n="assess.tab_leader">Integration Leader</button>
        </div>
        <div id="as-pane-overview" class="as-pane"></div>
        <div id="as-pane-acquirer" class="as-pane" style="display:none;"></div>
        <div id="as-pane-target" class="as-pane" style="display:none;"></div>
        <div id="as-pane-compat" class="as-pane" style="display:none;"></div>
        <div id="as-pane-leader" class="as-pane" style="display:none;"></div>
      </div>
    </main>
  </div>

  <script src="/js/assess-charts.js?v=1784500005"></script>
  <script src="/js/assessments.js?v=1784500007"></script>
</body>
</html>
