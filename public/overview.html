<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TE Connectivity - M&A HR Integration Enablement</title>
  <meta name="description" content="M&A HR Integration Enablement — the first ~100-day HR fine-tune overview: communication, culture, and onboarding & capability layers.">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css?v=1784200000">
  <script src="/js/transitions.js?v=1784200000"></script>
  <style>
    /* Overview host: the executive deck sits in the app content area (right of the
       sidebar, below the header) and fills the remaining space. */
    .app-container { display: flex; flex-direction: column; min-height: 100vh; }
    .overview-host {
      flex: 1 1 auto; position: relative; background: #0e1a20; min-height: 0;
      overflow: hidden;
    }
    #deckframe {
      position: absolute; inset: 0; width: 100%; height: 100%; border: 0; display: block;
    }
    /* When a deck box is clicked, its detail overlay opens — the bridge tells us, and
       we expand the iframe to cover the ENTIRE window (over header + sidebar). */
    body.deck-fullscreen #deckframe {
      position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 4000;
    }
    /* Floating CTA back into the role-based portal (kept one click away). */
    .overview-enter {
      position: absolute; left: 22px; bottom: 20px; z-index: 20;
      display: inline-flex; align-items: center; gap: 8px;
      background: #F28D00; color: #fff; font-weight: 800; font-size: 0.95rem;
      padding: 0.8rem 1.5rem; border-radius: 10px; text-decoration: none;
      box-shadow: 0 10px 26px rgba(0,0,0,.35); transition: transform .15s, box-shadow .15s;
    }
    .overview-enter:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(0,0,0,.45); }
    body.deck-fullscreen .overview-enter { display: none; }
  </style>
</head>
<body data-cms-page="overview">

  <div class="app-container">
    <!-- Brand Header (nav rebuilt by transitions.js) -->
    <header class="main-header">
      <div class="brand-wrapper">
        <div class="brand-logo-container">
          <svg class="brand-logo-svg" viewBox="0 0 160 40" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="0" width="40" height="40" rx="4" fill="#E98300" />
            <text x="20" y="27" text-anchor="middle" font-family="'Outfit', -apple-system, sans-serif" font-weight="900" font-size="20" fill="#FFFFFF">TE</text>
            <text x="48" y="26" font-family="'Inter', -apple-system, sans-serif" font-weight="700" font-size="15" fill="#244C5A" letter-spacing="-0.03em">connectivity</text>
          </svg>
        </div>
        <div class="brand-divider"></div>
        <div class="brand-title">
          <span class="portal-badge">M&A Integration</span>
        </div>
      </div>
      <nav class="navigation-bar">
        <a href="/index.html" class="nav-link">Role Showcase</a>
        <a href="/dashboard.html" class="nav-link">Integration Leader Portal</a>
        <a href="/employee.html?name=Alex&role=R%26D%20Specialist&dept=R%26D" class="nav-link">Employee Portal</a>
      </nav>
    </header>

    <main class="overview-host">
      <iframe id="deckframe" src="/overview-deck/deck.html" title="M&A HR Integration Enablement — executive overview"></iframe>
      <a href="/index.html" class="overview-enter" title="Enter the role-based portal">Enter the Portal →</a>
    </main>
  </div>

  <script>
    // Bridge: the embedded deck posts {type:'deck-overlay', open} whenever one of the
    // three layer overlays opens/closes; expand the iframe to full-screen so the
    // popover covers the whole window (over the app header + sidebar).
    window.addEventListener('message', function (e) {
      var d = e && e.data;
      if (d && d.type === 'deck-overlay') {
        document.body.classList.toggle('deck-fullscreen', !!d.open);
      } else if (d && d.type === 'open-slide' && d.url && window.openHtmlSlide) {
        // The deck's "Agenda" button asks us to open a standalone slide full-screen.
        window.openHtmlSlide(d.url, d.label || 'Slide');
      }
    });
  </script>
</body>
</html>
