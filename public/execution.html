<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TE Connectivity - Execution Hub</title>
  <meta name="description" content="Execution Hub — the Day-1 & 100-day integration checklist and all workstream tasks, including tasks generated from readiness-assessment gaps.">
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/style.css?v=1784300020">
  <script src="/js/transitions.js?v=1784500010"></script>
  <style>
    .ex-wrap{ max-width:1100px; margin:0 auto; }
    .ex-hero{ margin-bottom:1.25rem; }
    .ex-hero h1{ font-size:1.9rem; color:var(--te-dark-teal); margin:0 0 .35rem; }
    .ex-hero p{ color:var(--text-secondary); max-width:820px; line-height:1.55; margin:0; }
    .ex-top{ display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap; margin-bottom:1.1rem; }
    .ex-tabs{ display:flex; gap:.5rem; border-bottom:2px solid var(--border-color); margin-bottom:1.5rem; flex-wrap:wrap; }
    .ex-tab{ background:none; border:none; font-family:var(--font-family-display); font-size:1rem; font-weight:700; color:var(--text-dim); padding:.6rem 1.1rem; cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all .2s; }
    .ex-tab.active{ color:var(--te-dark-teal); border-bottom-color:var(--te-orange); }
    /* synergy */
    .syn-card{ background:var(--card-bg,#fff); border:1px solid var(--border-color); border-radius:10px; padding:.9rem 1.1rem; margin-bottom:.6rem; }
    .syn-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:.75rem; }
    .syn-title{ font-size:.92rem; font-weight:700; color:var(--text-primary); line-height:1.35; }
    .syn-meta{ font-size:.72rem; color:var(--text-dim); display:flex; gap:.75rem; flex-wrap:wrap; margin-top:.3rem; align-items:center; }
    .syn-cat{ font-size:.64rem; font-weight:800; border-radius:12px; padding:.12rem .55rem; }
    .syn-cat.revenue{ background:rgba(22,121,135,.1); color:#167987; border:1px solid rgba(22,121,135,.3); }
    .syn-cat.cost{ background:rgba(63,122,55,.1); color:#3f7a37; border:1px solid rgba(63,122,55,.3); }
    .syn-money{ flex:none; text-align:right; }
    .syn-realized{ font-size:1.05rem; font-weight:800; color:var(--te-dark-teal); }
    .syn-target{ font-size:.72rem; color:var(--text-dim); }
    .syn-track{ height:8px; border-radius:4px; background:var(--bg-subtle,#eef2f2); overflow:hidden; margin-top:.6rem; }
    .syn-fill{ height:100%; border-radius:4px; background:linear-gradient(90deg,var(--te-orange),#3f7a37); }
    .syn-realized-input{ width:76px; padding:.25rem .45rem; border:1.5px solid var(--border-color); border-radius:6px; font-family:inherit; font-size:.76rem; }
    /* raid */
    .raid-row{ display:flex; align-items:center; gap:.75rem; background:var(--card-bg,#fff); border:1px solid var(--border-color); border-radius:10px; padding:.6rem .9rem; margin-bottom:.45rem; }
    .raid-type{ flex:none; font-size:.64rem; font-weight:800; border-radius:12px; padding:.18rem .6rem; min-width:74px; text-align:center; }
    .raid-type.risk{ background:rgba(192,57,43,.1); color:#C0392B; border:1px solid rgba(192,57,43,.3); }
    .raid-type.issue{ background:rgba(199,119,0,.1); color:#C77700; border:1px solid rgba(199,119,0,.3); }
    .raid-type.decision{ background:rgba(22,121,135,.1); color:#167987; border:1px solid rgba(22,121,135,.3); }
    .raid-type.dependency{ background:rgba(100,116,139,.12); color:#475569; border:1px solid rgba(100,116,139,.3); }
    .raid-lvl{ font-size:.64rem; font-weight:800; }
    .raid-lvl.high{ color:#C0392B; } .raid-lvl.medium{ color:#C77700; } .raid-lvl.low{ color:#3f7a37; }
    .raid-fbtn{ border:1px solid var(--border-color); background:var(--card-bg,#fff); border-radius:20px; font-family:inherit; font-size:.74rem; font-weight:700; color:var(--text-dim); padding:.3rem .8rem; cursor:pointer; }
    .raid-fbtn.active{ background:var(--te-dark-teal); border-color:var(--te-dark-teal); color:#fff; }
    /* workstream rollup */
    .ex-ws-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:.75rem; margin-bottom:1.5rem; }
    .ex-ws{ background:var(--card-bg,#fff); border:1px solid var(--border-color); border-radius:10px; padding:.7rem .9rem; cursor:pointer; transition:all .15s; text-align:left; font-family:inherit; }
    .ex-ws:hover{ border-color:var(--te-orange); }
    .ex-ws.active{ border-color:var(--te-dark-teal); box-shadow:inset 0 0 0 1.5px var(--te-dark-teal); }
    .ex-ws-head{ display:flex; justify-content:space-between; align-items:center; gap:.5rem; margin-bottom:.35rem; }
    .ex-ws-name{ font-size:.8rem; font-weight:800; color:var(--te-dark-teal); }
    .ex-ws-count{ font-size:.72rem; font-weight:800; color:var(--text-dim); }
    .ex-ws-track{ height:7px; border-radius:4px; background:var(--bg-subtle,#eef2f2); overflow:hidden; }
    .ex-ws-fill{ height:100%; border-radius:4px; transition:width .4s ease; }
    .ex-ws-flag{ font-size:.66rem; font-weight:800; color:#C0392B; margin-top:.3rem; }
    /* phase sections */
    .ex-phase{ margin-bottom:1.5rem; }
    .ex-phase-head{ display:flex; align-items:center; gap:.75rem; margin-bottom:.6rem; }
    .ex-phase-title{ font-size:1rem; font-weight:800; color:var(--te-dark-teal); margin:0; }
    .ex-phase-count{ font-size:.72rem; font-weight:800; color:var(--text-dim); }
    .ex-task{ display:flex; align-items:center; gap:.75rem; background:var(--card-bg,#fff); border:1px solid var(--border-color); border-radius:10px; padding:.6rem .9rem; margin-bottom:.45rem; }
    .ex-task.done .ex-task-title{ text-decoration:line-through; color:var(--text-dim); }
    .ex-status{ flex:none; border:none; font-family:inherit; font-size:.68rem; font-weight:800; padding:.28rem .65rem; border-radius:20px; cursor:pointer; min-width:86px; text-align:center; color:#fff; }
    .ex-task-main{ flex:1; min-width:0; }
    .ex-task-title{ font-size:.86rem; font-weight:600; color:var(--text-primary); line-height:1.4; }
    .ex-task-meta{ font-size:.7rem; color:var(--text-dim); display:flex; gap:.75rem; flex-wrap:wrap; margin-top:.15rem; }
    .ex-src{ font-size:.64rem; font-weight:800; color:#C77700; background:rgba(233,131,0,.09); border:1px solid rgba(233,131,0,.25); border-radius:12px; padding:.1rem .5rem; }
    .ex-del{ flex:none; border:none; background:none; color:var(--text-dim); font-size:1rem; cursor:pointer; padding:.2rem .35rem; border-radius:6px; }
    .ex-del:hover{ color:#C0392B; background:rgba(192,57,43,.08); }
    .ex-empty{ font-size:.8rem; color:var(--text-dim); font-style:italic; padding:.4rem 0; }
    /* add form */
    .ex-add{ display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; background:var(--card-bg,#fff); border:1px dashed var(--border-color); border-radius:10px; padding:.7rem .9rem; margin-bottom:1.5rem; }
    .ex-add input, .ex-add select{ padding:.45rem .7rem; border:1.5px solid var(--border-color); border-radius:8px; font-family:inherit; font-size:.82rem; }
    .ex-add input[type="text"]{ flex:1; min-width:200px; }
  </style>
</head>
<body>
  <div class="app-container">
    <header class="main-header">
      <div class="brand-wrapper">
        <div class="brand-logo-container">
          <img class="brand-logo-svg" src="/te-logo.png" alt="TE Connectivity" style="height:36px;width:auto;display:block;">
        </div>
        <div class="brand-divider"></div>
        <div class="brand-title"><span class="portal-badge">M&A Integration</span></div>
      </div>
      <nav class="navigation-bar">
        <a href="/" class="nav-link">Overview</a>
        <a href="/assessments.html" class="nav-link" data-i18n="assess.nav">Assessments</a>
        <a href="/dashboard.html" class="nav-link">Integration Leader Portal</a>
      </nav>
    </header>

    <main class="main-content">
      <div class="ex-wrap">
        <div class="ex-hero">
          <h1 data-i18n="exec.title">Execution Hub</h1>
          <p data-i18n="exec.sub">The Day-1 & 100-day checklist and every workstream task in one place — including tasks created from readiness-assessment gaps.</p>
        </div>
        <div class="ex-tabs" id="ex-tabs">
          <button class="ex-tab active" data-ex-tab="tasks" data-i18n="exec.tab_tasks">Tasks & Checklist</button>
          <button class="ex-tab" data-ex-tab="synergy" data-i18n="exec.tab_synergy">Synergy Tracker</button>
          <button class="ex-tab" data-ex-tab="raid" data-i18n="exec.tab_raid">Risks & Decisions</button>
        </div>

        <div id="ex-pane-tasks">
          <div class="ex-top">
            <div id="ex-overall" style="display:flex;align-items:center;gap:.75rem;"></div>
            <button class="btn btn-secondary" id="ex-instantiate" style="display:none;font-size:.8rem;padding:.5rem 1rem;" data-i18n="exec.instantiate">Load the Day-1/100-day checklist</button>
          </div>
          <div class="ex-ws-grid" id="ex-ws-grid"></div>
          <div class="ex-add" id="ex-add">
            <input type="text" id="ex-new-title" data-i18n-ph="exec.task_title_ph" placeholder="Task title…">
            <select id="ex-new-ws"></select>
            <select id="ex-new-phase"></select>
            <input type="text" id="ex-new-owner" data-i18n-ph="exec.owner_ph" placeholder="Owner" style="width:130px;">
            <input type="date" id="ex-new-due">
            <button class="btn btn-primary" id="ex-add-btn" style="font-size:.82rem;padding:.5rem 1rem;" data-i18n="exec.btn_add">Add</button>
          </div>
          <div id="ex-phases"></div>
        </div>

        <div id="ex-pane-synergy" style="display:none;">
          <div id="syn-rollup"></div>
          <div class="ex-add">
            <input type="text" id="syn-new-title" data-i18n-ph="syn.title_ph" placeholder="Initiative title…">
            <select id="syn-new-cat">
              <option value="revenue">Revenue</option>
              <option value="cost">Cost</option>
            </select>
            <input type="number" id="syn-new-target" min="0" step="0.1" data-i18n-ph="syn.target_ph" placeholder="Target $M" style="width:110px;">
            <input type="text" id="syn-new-owner" data-i18n-ph="exec.owner_ph" placeholder="Owner" style="width:130px;">
            <button class="btn btn-primary" id="syn-add-btn" style="font-size:.82rem;padding:.5rem 1rem;" data-i18n="exec.btn_add">Add</button>
          </div>
          <div id="syn-list"></div>
        </div>

        <div id="ex-pane-raid" style="display:none;">
          <div id="raid-filters" style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;"></div>
          <div class="ex-add">
            <select id="raid-new-type">
              <option value="risk">Risk</option>
              <option value="issue">Issue</option>
              <option value="decision">Decision</option>
              <option value="dependency">Dependency</option>
            </select>
            <input type="text" id="raid-new-title" data-i18n-ph="raid.title_ph" placeholder="Risk / issue / decision…">
            <select id="raid-new-sev">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
            </select>
            <input type="text" id="raid-new-owner" data-i18n-ph="exec.owner_ph" placeholder="Owner" style="width:130px;">
            <button class="btn btn-primary" id="raid-add-btn" style="font-size:.82rem;padding:.5rem 1rem;" data-i18n="exec.btn_add">Add</button>
          </div>
          <div id="raid-list"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/execution.js?v=1784500008"></script>
</body>
</html>
